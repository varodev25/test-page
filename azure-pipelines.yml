trigger:
- main

resources:
- repo: self

variables:
  tag: '$(Build.BuildId)'
  imageName: 'demo-page'

stages:
- stage: Build
  displayName: Build image

  jobs:
  - job: Build

    pool:
      vmImage: ubuntu-latest

    steps:

    - task: Docker@2
      displayName: Build Docker image

      inputs:
        command: build
        repository: $(imageName)
        Dockerfile: Dockerfile
        tags: |
          $(tag)
